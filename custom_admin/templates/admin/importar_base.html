{% extends "admin/base_site.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
  <div class="content">
    <h1 style="margin-bottom: 20px;">{{ titulo_pagina }}</h1>

    {% if messages %}
      <ul class="messagelist">
        {% for message in messages %}
          <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <div class="module">
      <form method="post" enctype="multipart/form-data" class="form-row">
        {% csrf_token %}
        <fieldset class="module aligned">
          <div class="form-row">
            <label for="id_arquivo"><strong>Selecionar Arquivo: CSV XLS XLSX</strong></label>
            <input type="file" name="arquivo" id="id_arquivo" accept=".csv,.xls,.xlsx" required onchange="mostrarNomeArquivo(this)">
            <p id="nome-arquivo" style="margin-top:5px;color:#006400;font-weight:bold;"></p>
          </div>
        </fieldset>
        <div class="submit-row">
          <input type="submit" value="Importar" class="default">
        </div>
      </form>
    </div>
  </div>

  <script>
    function mostrarNomeArquivo(input) {
      const nome = input.files.length ? input.files[0].name : "";
      document.getElementById('nome-arquivo').innerText = nome;
    }
  </script>
{% endblock %}
